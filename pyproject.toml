[tool.black]
line-length = 100
target-version = ["py312"]
exclude = '''
/(
    \.git
  | \.venv
  | build
  | dist
  | __pycache__
)/
'''
extend-exclude = '''
(
    custom_map_downloader/resources\.py
  | custom_map_downloader/resources_rc\.py
  | custom_map_downloader/CustomMapDownloader_dialog_base_ui\.py
  | test/integration/__init__\.py
)$
'''

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
  "custom_map_downloader/resources.py",
  "custom_map_downloader/resources_rc.py",
  "custom_map_downloader/CustomMapDownloader_dialog_base_ui.py",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "B",
]
ignore = [
  "E501",
  "B008",
]

[tool.ruff.lint.per-file-ignores]
"test/**/*.py" = ["E402"]
"custom_map_downloader/resources.py" = ["ALL"]

[tool.pytest.ini_options]
testpaths = ["test"]
python_files = ["test_*.py"]
addopts = "-ra"

[tool.qgis-plugin-ci]
plugin_path = "custom_map_downloader"
github_organization_slug = "JoergHippe"
project_slug = "custom_map_downloader"
changelog_include = false
use_project_slug_as_plugin_directory = true
