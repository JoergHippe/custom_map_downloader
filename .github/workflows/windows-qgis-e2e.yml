name: Windows QGIS E2E

on:
  workflow_dispatch:

jobs:
  windows-qgis-e2e:
    runs-on: [self-hosted, windows, qgis]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run deployed-plugin E2E smoke tests
        shell: cmd
        run: |
          set CMD_INTEGRATION_REPORT_DIR=%CD%\artifacts
          run_integration_tests.bat e2e github-actions

      - name: Run network scale matrix
        shell: cmd
        run: |
          set CMD_INTEGRATION_REPORT_DIR=%CD%\artifacts
          python scripts\run_windows_qgis_matrix.py

      - name: Summarize scale matrix
        shell: cmd
        run: |
          set CMD_INTEGRATION_REPORT_DIR=%CD%\artifacts
          python scripts\summarize_scale_matrix.py --write-summary

      - name: Validate scale matrix report
        shell: cmd
        run: |
          python scripts\check_scale_matrix_report.py artifacts\scale_matrix_report.json

      - name: Upload QGIS E2E artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-qgis-e2e-artifacts
          path: artifacts
          if-no-files-found: warn

      - name: Upload scale matrix report
        uses: actions/upload-artifact@v4
        with:
          name: windows-qgis-scale-report
          path: |
            artifacts/scale_matrix_report.json
            artifacts/scale_matrix_report.md
          if-no-files-found: error
