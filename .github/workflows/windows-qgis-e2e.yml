name: Windows QGIS E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * 1'

concurrency:
  group: windows-qgis-e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-qgis-e2e:
    runs-on: [self-hosted, windows, qgis]
    timeout-minutes: 45
    env:
      CMD_INTEGRATION_REPORT_DIR: ${{ github.workspace }}\artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run deployed-plugin E2E smoke tests
        shell: cmd
        run: run_integration_tests.bat e2e github-actions

      - name: Run network scale matrix
        shell: cmd
        run: python scripts\run_windows_qgis_matrix.py

      - name: Summarize scale matrix
        shell: cmd
        if: always()
        run: python scripts\summarize_scale_matrix.py --write-summary

      - name: Validate scale matrix report
        shell: cmd
        if: always()
        run: python scripts\check_scale_matrix_report.py artifacts\scale_matrix_report.json

      - name: Run official webmaps catalog
        shell: cmd
        if: always()
        env:
          CMD_INTEGRATION_REPORT_DIR: ${{ github.workspace }}\artifacts\official_webmaps_catalog
        run: python scripts\run_windows_qgis_scenarios.py --group official_webmaps_catalog

      - name: Summarize official webmaps catalog
        shell: cmd
        if: always()
        env:
          CMD_INTEGRATION_REPORT_DIR: ${{ github.workspace }}\artifacts\official_webmaps_catalog
        run: python scripts\summarize_network_catalog.py --group official_webmaps_catalog --write-summary

      - name: Validate official webmaps catalog report
        shell: cmd
        if: always()
        run: python scripts\check_network_catalog_report.py artifacts\official_webmaps_catalog\scenario_catalog_report.json

      - name: Upload QGIS E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-qgis-e2e-artifacts
          path: artifacts
          if-no-files-found: warn
          retention-days: 14

      - name: Upload scale matrix report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-qgis-scale-report
          path: |
            artifacts/scale_matrix_report.json
            artifacts/scale_matrix_report.md
          if-no-files-found: error
          retention-days: 14

      - name: Upload network catalog report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-qgis-network-catalog-report
          path: |
            artifacts/official_webmaps_catalog/scenario_catalog_report.json
            artifacts/official_webmaps_catalog/scenario_catalog_report.md
          if-no-files-found: error
          retention-days: 14
