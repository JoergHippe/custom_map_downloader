name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run unit tests (stubbed)
        run: python -m unittest discover -s test -v

  qgis-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull official QGIS Docker image
        run: docker pull qgis/qgis:latest

      - name: Run QGIS-backed test suite
        run: |
          docker run --rm \
            -e QT_QPA_PLATFORM=offscreen \
            -e QGIS_PREFIX_PATH=/usr \
            -v "$PWD":/workspace \
            -w /workspace \
            qgis/qgis:latest \
            bash -lc "python3 -m unittest discover -s test -v"
